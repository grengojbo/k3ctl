# Cloudflare Tunnel — єдиний тунель для всіх сервісів iwis-ai.
# Routing визначається у Cloudflare Zero Trust Dashboard → Tunnels → Public Hostname:
#
#  hello.iwis.dev           → http://whoami.default.svc.cluster.local:80          (публічний)
#  longhorn.k3s.iwis.dev    → http://longhorn-frontend.longhorn-system.svc.cluster.local:80  (Access policy)
#  hubble.k3s.iwis.dev      → http://hubble-ui.kube-system.svc.cluster.local:80   (Access policy)
#
# Підготовка:
#   kubectl create ns cloudflared
#   kubectl -n cloudflared create secret generic cloudflared-token --from-literal=token=$CLOUDFLARE_TUNNEL_TOKEN
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared
spec:
  replicas: 2
  selector:
    matchLabels: { app: cloudflared }
  template:
    metadata:
      labels: { app: cloudflared }
    spec:
      nodeSelector:
        role: lb
      tolerations:
        - key: dedicated
          operator: Equal
          value: lb
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels: { app: cloudflared }
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:2000
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-token
                  key: token
          livenessProbe:
            httpGet: { path: /ready, port: 2000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: 50m,  memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
