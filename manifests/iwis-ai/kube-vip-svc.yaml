---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app.kubernetes.io/name: kube-vip-svc
  name: kube-vip-svc
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-vip-svc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-vip-svc
    spec:
      containers:
      - args:
        - manager
        env:
        - name: vip_arp
          value: "true"
        - name: vip_interface
          value: eth0
        - name: cp_enable
          value: "false"
        - name: svc_enable
          value: "true"
        - name: vip_leaderelection
          value: "true"
        image: ghcr.io/kube-vip/kube-vip:v0.8.0
        name: kube-vip
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
      hostNetwork: true
      nodeSelector:
        role: lb
      serviceAccountName: kube-vip
      tolerations:
      - effect: NoSchedule
        key: dedicated
        operator: Equal
        value: lb
